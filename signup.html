<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Crisis Navigation System</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .app-container {
            position: relative;
            background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%);
        }
        .decorator {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }
        .decorator-1 {
            width: 250px;
            height: 250px;
            background: rgba(59, 130, 246, 0.4);
            top: -50px;
            left: -50px;
        }
        .decorator-2 {
            width: 300px;
            height: 300px;
            background: rgba(168, 85, 247, 0.3);
            bottom: -50px;
            right: -50px;
        }
        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 16px 20px 60px;
            position: relative;
            z-index: 1;
            overflow-y: auto;
        }
        .auth-container::-webkit-scrollbar {
            width: 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 32px 24px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            text-align: center;
        }
        .auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary-blue), #6366f1);
            color: var(--white);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }
        .auth-title {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-dark);
        }
        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .input-group {
            flex: 1;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-left: 4px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i.icon-left {
            position: absolute;
            left: 14px;
            color: #94a3b8;
            font-size: 20px;
            transition: color 0.3s ease;
            pointer-events: none;
        }
        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-dark);
            transition: all 0.3s ease;
            font-family: var(--font-main);
            -webkit-appearance: none;
        }
        .input-wrapper select {
            padding-right: 36px;
            cursor: pointer;
        }
        .select-icon {
            position: absolute;
            right: 14px;
            color: #94a3b8;
            pointer-events: none;
            font-size: 18px;
        }
        .input-wrapper:focus-within input, .input-wrapper:focus-within select {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: var(--white);
        }
        .input-wrapper:focus-within i.icon-left {
            color: var(--primary-blue);
        }

        .auth-submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-blue), #6366f1);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            margin-top: 12px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .auth-submit-btn:active {
            transform: scale(0.97);
            box-shadow: 0 5px 10px rgba(59, 130, 246, 0.3);
        }
        .auth-links {
            margin-top: 24px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .auth-links a {
            color: var(--primary-blue);
            font-weight: 600;
            text-decoration: none;
            position: relative;
        }
        .auth-links a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: var(--primary-blue);
            transform: scaleX(0);
            transition: transform 0.3s ease;
            transform-origin: right;
        }
        .auth-links a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        .section-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0 10px;
            color: var(--primary-blue);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section-divider::before, .section-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px dashed #cbd5e1;
        }
        .section-divider:not(:empty)::before {
            margin-right: .75em;
        }
        .section-divider:not(:empty)::after {
            margin-left: .75em;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Decorative Background Entities -->
        <div class="decorator decorator-1"></div>
        <div class="decorator decorator-2"></div>

        <!-- Header -->
        <header class="app-header" style="position: relative; z-index: 2;">
            <div class="header-left">
                <button onclick="history.back()" class="icon-btn"><i class="ph-bold ph-arrow-left"></i></button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="auth-container">
            <div class="auth-card">
                <div class="auth-logo"><i class="ph-fill ph-user-plus"></i></div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join Crisis Navigation to stay safe</p>
                
                <form class="auth-form" id="signup-form">
                    <div class="input-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <i class="ph-bold ph-user icon-left"></i>
                            <input type="text" placeholder="John Doe" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="input-group">
                            <label>Phone Number</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-phone icon-left"></i>
                                <input type="tel" placeholder="+1234567890" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Blood Group</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-drop icon-left" style="color: #ef4444;"></i>
                                <select required>
                                    <option value="" disabled selected>Select</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                </select>
                                <i class="ph-bold ph-caret-down select-icon"></i>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="ph-bold ph-envelope-simple icon-left"></i>
                            <input type="email" placeholder="john@example.com" required>
                        </div>
                    </div>

                    <div class="section-divider">Emergency Contact</div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Name</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-users icon-left"></i>
                                <input type="text" placeholder="Jane Doe" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Phone</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-phone icon-left"></i>
                                <input type="tel" placeholder="+1234567890" required>
                            </div>
                        </div>
                    </div>

                    <div class="section-divider">Security</div>

                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="ph-bold ph-lock-key icon-left"></i>
                            <input type="password" placeholder="Create a strong password" required minlength="8">
                        </div>
                    </div>

                    <button type="submit" class="auth-submit-btn">Complete Sign Up</button>
                </form>

                <div class="auth-links">
                    Already have an account? <a href="signin.html">Sign In</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Simulate account creation & login
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('showLoginToast', 'true');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
