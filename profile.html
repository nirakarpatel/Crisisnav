<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Crisis Navigation System</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 32px 24px 24px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            position: relative;
        }
        .profile-img-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .profile-img-container:hover {
            transform: scale(1.05);
        }
        .profile-img-container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #eff6ff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .upload-icon {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary-blue);
            color: var(--white);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--white);
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-family: var(--font-main);
            font-size: 0.95rem;
            color: var(--text-dark);
            background: #f8fafc;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus {
            border-color: var(--primary-blue);
            background: var(--white);
            box-shadow: 0 0 0 4px #eff6ff;
        }
        .save-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: var(--white);
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
            margin-top: 10px;
        }
        .save-btn:active {
            transform: scale(0.98);
            box-shadow: 0 5px 10px rgba(59, 130, 246, 0.2);
        }
        .app-header .header-left .icon-btn {
            background: #f1f5f9;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="side-menu" id="side-menu">
        <div class="menu-header">
            <div class="menu-logo">
                <i class="ph-fill ph-shield-check"></i>
                <h2>CrisisNav</h2>
            </div>
        </div>
        <div class="menu-links">
            <a href="index.html" class="menu-link"><i class="ph-bold ph-house"></i> Home</a>
            <a href="my-crises.html" class="menu-link"><i class="ph-bold ph-briefcase"></i> My Crises</a>
            <a href="reports.html" class="menu-link"><i class="ph-bold ph-file-text"></i> Reports</a>
            <a href="settings.html" class="menu-link"><i class="ph-bold ph-gear"></i> Settings</a>
            <a href="profile.html" class="menu-link active"><i class="ph-bold ph-user-circle"></i> Profile</a>
        </div>
        <div class="menu-recent-activity">
            <h3>Recent System Activity</h3>
            <div id="sidebar-activity-list" class="sidebar-activity-list">
                <!-- Activities will be injected here by JS -->
                <div class="sidebar-activity-placeholder">No activities recorded in this session</div>
            </div>
        </div>
        <div class="menu-footer">
            <a href="#" class="logout-btn"><i class="ph-bold ph-sign-out"></i> Log Out</a>
        </div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <button id="menu-toggle" class="icon-btn"><i class="ph-bold ph-list"></i></button>
                <h1 class="app-title">Profile</h1>
            </div>
            <div class="header-right">
                <div class="profile-pic">
                    <img id="header-profile-pic" src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=100&h=100&fit=crop" alt="Profile">
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <div class="profile-header">
                <div class="profile-img-container" id="upload-trigger">
                    <img id="profile-preview" src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=100&h=100&fit=crop" alt="Profile">
                    <div class="upload-icon"><i class="ph-bold ph-camera"></i></div>
                </div>
                <input type="file" id="file-upload" style="display: none;" accept="image/*">
                
                <h2 id="profile-name-display">Alex Carter</h2>
                <p id="profile-role-display">User</p>
            </div>

            <form id="profile-form" class="profile-details" style="padding: 24px 20px;">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="input-name" class="form-input" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <input type="text" id="input-role" class="form-input" placeholder="Enter your role">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="input-email" class="form-input" placeholder="Enter your email" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="tel" id="input-phone" class="form-input" placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label class="form-label">Blood Group</label>
                    <input type="text" id="input-blood" class="form-input" placeholder="Enter your blood group">
                </div>

                <button type="submit" class="save-btn">
                    <i class="ph-bold ph-floppy-disk"></i> Save Changes
                </button>
            </form>
        </main>

        <!-- Bottom Tab Bar -->
        <nav class="app-nav">
            <button class="nav-item" onclick="window.location.href='index.html'">
                <i class="ph-bold ph-house"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="window.location.href='my-crises.html'">
                <div class="nav-badge">1</div>
                <i class="ph-bold ph-briefcase"></i>
                <span>My Crisis</span>
            </button>
            <button id="voice-btn" class="nav-mic-btn">
                <div class="mic-inner">
                    <i class="ph-fill ph-microphone"></i>
                </div>
            </button>
            <button class="nav-item" onclick="window.location.href='reports.html'">
                <i class="ph-bold ph-file-text"></i>
                <span>Reports</span>
            </button>
            <button class="nav-item active" onclick="window.location.href='profile.html'">
                <i class="ph-bold ph-user-circle"></i>
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script type="module">
        import { supabase } from './supabase.js'

        document.addEventListener('DOMContentLoaded', async () => {
            const fileUpload = document.getElementById('file-upload');
            const uploadTrigger = document.getElementById('upload-trigger');
            const profilePreview = document.getElementById('profile-preview');
            const headerProfilePic = document.getElementById('header-profile-pic');
            const profileForm = document.getElementById('profile-form');
            
            const inputName = document.getElementById('input-name');
            const inputRole = document.getElementById('input-role');
            const inputEmail = document.getElementById('input-email');
            const inputPhone = document.getElementById('input-phone');
            const inputBlood = document.getElementById('input-blood');
            
            const displayTitle = document.getElementById('profile-name-display');
            const displayRole = document.getElementById('profile-role-display');

            // 1. Check Session
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.replace('signin.html');
                return;
            }
            localStorage.setItem('isLoggedIn', 'true');

            const user = session.user;
            inputEmail.value = user.email;

            // 2. Load Profile Data
            const loadProfileData = async () => {
                const { data: profile, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                if (error && error.code !== 'PGRST116') {
                    console.warn('Profile fetch error:', error.message);
                }

                if (profile) {
                    inputName.value = profile.full_name || '';
                    displayTitle.textContent = profile.full_name || 'User';
                    inputPhone.value = profile.phone || '';
                    inputBlood.value = profile.blood_group || '';
                }

                // Handle Profile Pic & Role (Local storage for simplicity in this prototype)
                const pic = localStorage.getItem('crisisnav_profile_pic');
                if (pic) {
                    profilePreview.src = pic;
                    if (headerProfilePic) headerProfilePic.src = pic;
                }

                const role = localStorage.getItem('crisisnav_profile_role');
                if (role) {
                    inputRole.value = role;
                    displayRole.textContent = role;
                }
            };

            await loadProfileData();

            // Handle Logout
            document.querySelectorAll('.logout-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    await supabase.auth.signOut();
                    localStorage.removeItem('isLoggedIn');
                    window.location.replace('signin.html');
                });
            });

            // Handle image click
            uploadTrigger.addEventListener('click', () => fileUpload.click());

            // Handle image change
            fileUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const dataUrl = event.target.result;
                        profilePreview.src = dataUrl;
                        if (headerProfilePic) headerProfilePic.src = dataUrl;
                        localStorage.setItem('crisisnav_profile_pic', dataUrl);
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Handle form save
            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const saveBtn = profileForm.querySelector('.save-btn');
                const originalText = saveBtn.innerHTML;

                try {
                    saveBtn.disabled = true;
                    saveBtn.innerHTML = '<i class="ph-bold ph-spinner-gap ph-spin"></i> Saving...';

                    // Update Profiles table
                    const { error } = await supabase
                        .from('profiles')
                        .upsert({
                            id: user.id,
                            full_name: inputName.value,
                            phone: inputPhone.value,
                            blood_group: inputBlood.value,
                            updated_at: new Date()
                        });

                    if (error) throw error;

                    localStorage.setItem('crisisnav_profile_role', inputRole.value);
                    displayTitle.textContent = inputName.value || 'User';
                    displayRole.textContent = inputRole.value || 'User';

                    saveBtn.innerHTML = '<i class="ph-bold ph-check"></i> Saved!';
                    saveBtn.style.background = '#16a34a';
                    
                    setTimeout(() => {
                        saveBtn.disabled = false;
                        saveBtn.innerHTML = originalText;
                        saveBtn.style.background = 'var(--primary-blue)';
                    }, 2000);

                } catch (err) {
                    console.error('Update Error:', err.message);
                    alert('Update Failed: ' + err.message);
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = originalText;
                }
            });
        });
    </script>
</body>
</html>
